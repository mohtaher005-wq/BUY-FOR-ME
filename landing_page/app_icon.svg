<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05070a"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>

    <!-- Primary neon green glow gradient -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for orb -->
    <filter id="orb-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shadow for card -->
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#00ff88" flood-opacity="0.25"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="icon-clip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg-grad)"/>

  <!-- Ambient glows in background -->
  <circle cx="200" cy="200" r="250" fill="#00ff88" opacity="0.04" filter="url(#orb-glow)"/>
  <circle cx="820" cy="820" r="200" fill="#00d4ff" opacity="0.04" filter="url(#orb-glow)"/>

  <!-- Glass card behind icon -->
  <rect x="212" y="200" width="600" height="480" rx="60" ry="60"
        fill="rgba(255,255,255,0.04)"
        stroke="rgba(255,255,255,0.10)"
        stroke-width="2"
        filter="url(#card-shadow)"/>

  <!-- Shopping bag body -->
  <g filter="url(#glow)" clip-path="url(#icon-clip)">
    <!-- Bag body -->
    <path d="M380 420 L360 660 Q358 680 378 680 L646 680 Q666 680 664 660 L644 420 Z"
          fill="url(#primary-grad)" opacity="0.95"/>

    <!-- Bag top bar -->
    <rect x="340" y="400" width="344" height="40" rx="20" fill="url(#primary-grad)"/>

    <!-- Bag handle left -->
    <path d="M420 400 Q420 310 512 310 Q604 310 604 400"
          fill="none"
          stroke="url(#primary-grad)"
          stroke-width="36"
          stroke-linecap="round"/>

    <!-- Checkmark inside bag -->
    <path d="M440 555 L490 610 L590 505"
          fill="none"
          stroke="#05070a"
          stroke-width="38"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Brand text "BUY FOR ME" -->
  <text x="512" y="770"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="72"
        font-weight="900"
        fill="url(#primary-grad)"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#glow)">BUY FOR ME</text>

  <!-- Subtitle -->
  <text x="512" y="830"
        font-family="'Arial', sans-serif"
        font-size="32"
        font-weight="400"
        fill="rgba(255,255,255,0.35)"
        text-anchor="middle"
        letter-spacing="6">اشترِ لي</text>

  <!-- Small decorative dots -->
  <circle cx="512" cy="880" r="6" fill="#00ff88" opacity="0.6"/>
  <circle cx="536" cy="880" r="4" fill="#00d4ff" opacity="0.4"/>
  <circle cx="488" cy="880" r="4" fill="#00d4ff" opacity="0.4"/>

  <!-- Border glow ring -->
  <rect x="4" y="4" width="1016" height="1016" rx="218" ry="218"
        fill="none"
        stroke="url(#primary-grad)"
        stroke-width="4"
        opacity="0.3"/>
</svg>
